name: Release Obsidian plugin

on:
    push:
        tags:
            - '*.*.*'

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            attestations: write
            id-token: write

        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.22.0

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate release tag
              run: |
                  tag="${GITHUB_REF_NAME}"
                  manifest_version="$(node -p "require('./manifest.json').version")"
                  package_version="$(node -p "require('./package.json').version")"

                  if [ "$tag" != "$manifest_version" ]; then
                    echo "Tag '$tag' must match manifest.json version '$manifest_version'."
                    exit 1
                  fi

                  if [ "$tag" != "$package_version" ]; then
                    echo "Tag '$tag' must match package.json version '$package_version'."
                    exit 1
                  fi

            - name: Check local XMind viewer patch
              run: pnpm check:local-viewer

            - name: Lint
              run: pnpm lint

            - name: Build release assets
              run: pnpm package

            - name: Attest release assets
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: |
                      dist/main.js
                      dist/manifest.json
                      dist/styles.css

            - name: Create GitHub release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF_NAME}"

                  gh release create "$tag" \
                    --title "$tag" \
                    --generate-notes \
                    dist/main.js \
                    dist/manifest.json \
                    dist/styles.css
