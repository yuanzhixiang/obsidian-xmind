<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>XMind debug viewer</title>
        <script>
            window.__xmindDebugEarlyErrors = [];
            window.addEventListener('error', function (event) {
                window.__xmindDebugEarlyErrors.push({
                    message: event.message,
                    source: event.filename,
                    line: event.lineno,
                    column: event.colno,
                });
            });
            window.addEventListener('unhandledrejection', function (event) {
                window.__xmindDebugEarlyErrors.push({
                    message:
                        event.reason && event.reason.message
                            ? event.reason.message
                            : String(event.reason),
                    source: 'unhandledrejection',
                    line: 0,
                    column: 0,
                });
            });
        </script>
        <link rel="stylesheet" href="/styles.css" />
        <link rel="stylesheet" href="/plugin-styles.css" />
    </head>
    <body>
        <main class="shell">
            <header
                class="toolbar"
                aria-label="Debug toolbar"
                data-i18n-aria-label="debugToolbar"
            >
                <section
                    class="identity"
                    aria-label="Current file"
                    data-i18n-aria-label="currentFile"
                >
                    <span
                        class="status-dot"
                        id="statusDot"
                        aria-hidden="true"
                    ></span>
                    <div>
                        <h1 data-i18n="appTitle">XMind debug viewer</h1>
                        <p id="fileLabel" data-i18n="loadingDefaultFile">
                            Waiting for default file
                        </p>
                    </div>
                </section>

                <section
                    class="controls"
                    aria-label="Viewer controls"
                    data-i18n-aria-label="viewerControl"
                >
                    <input
                        id="fileInput"
                        type="file"
                        accept=".xmind,application/octet-stream"
                        hidden
                    />
                    <button id="openFileButton" type="button" data-i18n="openFile">
                        Open file
                    </button>
                    <button id="reloadButton" type="button" data-i18n="reload">
                        Reload
                    </button>
                    <button id="fitButton" type="button" data-i18n="fitCanvas">
                        Fit canvas
                    </button>
                    <label class="field">
                        <span data-i18n="zoom">Zoom</span>
                        <input
                            id="zoomInput"
                            type="number"
                            min="20"
                            max="250"
                            step="10"
                            value="100"
                        />
                    </label>
                    <button id="zoomButton" type="button" data-i18n="apply">
                        Apply
                    </button>
                    <label class="field field-wide">
                        <span>Sheet</span>
                        <select id="sheetSelect">
                            <option value="" data-i18n="sheetSelectLoading">
                                Waiting for load
                            </option>
                        </select>
                    </label>
                </section>
            </header>

            <section class="workspace">
                <div
                    class="viewer-frame-wrap xmind-viewer-content"
                    id="viewerHost"
                    aria-label="XMind render area"
                    data-i18n-aria-label="viewerLabel"
                ></div>
                <aside
                    class="log-panel"
                    aria-label="Event log"
                    data-i18n-aria-label="eventLog"
                >
                    <div class="log-heading">
                        <h2 data-i18n="events">Events</h2>
                        <button
                            id="clearLogButton"
                            type="button"
                            data-i18n="clear"
                        >
                            Clear
                        </button>
                    </div>
                    <ol id="eventLog"></ol>
                </aside>
            </section>
        </main>

        <script src="/debug-runtime/xmind-viewer.js"></script>
        <script src="/app.js"></script>
    </body>
</html>
